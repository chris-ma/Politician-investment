name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-check:
    name: Syntax & lint check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax (compile all modules)
        run: python -m compileall app scripts -q

      - name: Verify imports are resolvable
        run: |
          python -c "from app.core.config import settings"
          python -c "from app.db.models import Politician, InterestsSummary, RefreshRun"
          python -c "from app.services.dashboard import get_dashboard_rows, get_summary_stats"
        env:
          # Provide a dummy DATABASE_URL so config import doesn't error
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
