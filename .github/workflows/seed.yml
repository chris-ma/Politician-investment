name: Seed 2025 Politicians

on:
  workflow_dispatch:   # Manual trigger only — run once from the Actions tab

jobs:
  seed:
    name: Seed 48th Parliament politician metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run seed script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/seed_2025.py
